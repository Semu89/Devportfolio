<section id="products">
    <h2>Available Products</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 
                md:grid-cols-3 lg:grid-cols-4 gap-6">

                <style>
                    .card {
                      box-shadow:  #11998e, #38ef7d;
                      max-width: 300px;
                      margin: auto;
                      text-align: center;
                      font-family: arial;
                    }
                    
                    .title {
                      color: rgb(89, 82, 235);
                      font-size: 28px;
                    }
                    
                    button {
                      border: none;
                      outline: 0;
                      display: inline-block;
                      padding: 8px;
                      color: rgb(27, 22, 22);
                      background-color: #511fe7, #41f084;
                      text-align: center;
                      cursor: pointer;
                      width: 100%;
                      font-size: 18px;
                    }
                    
                    a {
                      text-decoration: none;
                      font-size: 22px;
                      color: black;
                    }
                    
                    button:hover, a:hover {
                      opacity: 0.7;
                    }
                    </style>
                    </head>
                    <body>    
                    <div class="card">
                        <aside id="cart">
                            <h2>Shopping Cart</h2>
                            <ul id="cart-items">
                            </ul>
                            <button id="buy-button" onclick="checkout()">Buy</button>
                        </aside>
                        </div>
                        <script>
                        let Items = [];
                        function addToCart(name, price) {
                            const index = Items.findIndex(item => item.name === name);
                            if (index !== -1) {
                                Items[index].quantity += 1;
                            } else {
                                const item = {
                                    name: name,
                                    price: price,
                                    quantity: 1
                                };
                                Items.push(item);
                            }
                            updateCartDisplay();
                        }
                        function deleteFromCart(index) {
                            Items.splice(index, 1);
                            updateCartDisplay();
                        }
                        function updateQuantity(index, quantity) {
                            Items[index].quantity = quantity;
                            updateCartDisplay();
                        }
                        function checkout() {
                            let totalPrice = 0;
                            Items.forEach(item => {
                                totalPrice += item.price * item.quantity;
                            });
                            alert(`Total price: $${totalPrice.toFixed(2)}`);
                        }
                        function updateCartDisplay() {
                            const cartElement = document.getElementById('cart-items');
                            cartElement.innerHTML = '';
                            Items.forEach((item, index) => {
                                const li = document.createElement('li');
                                li.className = 'cart-item';
                                li.innerHTML = `
                                    <span>${item.name} - $${item.price.toFixed(2)} x 
                                    <div class="quantity">
                                        <button onclick="updateQuantity(${index},
                                         ${item.quantity - 1})">-</button>
                                        <input type="number" 
                                        value="${item.quantity}" 
                                        min="1" max="10" 
                                        onchange="updateQuantity(${index},
                                         this.value)">
                                        <button 
                                        onclick="updateQuantity(${index},
                                         ${item.quantity + 1})">+</button>
                                    </div>
                                    </span>
                                    <button onclick="deleteFromCart(${index})">Delete</button>
                                `;
                                cartElement.appendChild(li);
                            });
                        }
                        </script>
                        </body>
                    </div>
                    
                    </body>
                    </html>
